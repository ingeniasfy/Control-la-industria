// Lee ambas colecciones originales y las combina
async function loadAllRecords(onUpdate) {
  const unsubs = [];
  let ventas = [], gastos = [];

  const merge = () => {
    // Normalizar ventas → tipo="ventas"
    const vNorm = ventas.map(v => ({
      id: "v_" + v.id, _col: "ventas", _origId: v.id,
      tipo: "ventas",
      subtipo: v.metodo || "",
      canal: v.canal || "sitio",
      monto: Number(v.monto || 0),
      desc: v.concepto || "",
      fecha: v.fecha,
    }));
    // Normalizar gastos → tipo=categoria
    const gNorm = gastos.map(g => ({
      id: "g_" + g.id, _col: "gastos", _origId: g.id,
      tipo: g.categoria || "operativo",
      subtipo: "",
      monto: Number(g.monto || 0),
      desc: g.concepto || "",
      fecha: g.fecha,
    }));
    onUpdate([...vNorm, ...gNorm]);
  };

  const uV = db.collection("ventas").orderBy("fecha","desc").onSnapshot(snap => {
    ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
    merge();
  }, err => console.error("ventas error:", err));

  const uG = db.collection("gastos").orderBy("fecha","desc").onSnapshot(snap => {
    gastos = snap.docs.map(d => ({id: d.id, ...d.data()}));
    merge();
  }, err => console.error("gastos error:", err));

  return () => { uV(); uG(); };
}

async function saveRecord(rec) {
  const ts = firebase.firestore.Timestamp.fromDate(
    new Date(rec.fecha + 'T12:00:00')
  );
  if (rec.tipo === "ventas") {
    await db.collection("ventas").add({
      concepto: rec.desc || "Venta",
      monto: rec.monto,
      canal: rec.subtipo === "Efectivo" || rec.subtipo === "Transferencia" ||
             rec.subtipo === "Nequi/Daviplata" || rec.subtipo === "Tarjeta" ? "sitio" :
             rec.subtipo === "Pedidos Ya" ? "domicilio" : "sitio",
      metodo: rec.subtipo || "Efectivo",
      fecha: ts,
      uid: Date.now().toString(36),
    });
  } else {
    await db.collection("gastos").add({
      concepto: rec.desc || rec.tipo,
      monto: rec.monto,
      categoria: rec.tipo,
      fecha: ts,
      uid: Date.now().toString(36),
    });
  }
}

async function removeRecord(rec) {
  if (rec._col === "ventas") {
    await db.collection("ventas").doc(rec._origId).delete();
  } else {
    await db.collection("gastos").doc(rec._origId).delete();
  }
}

function App() {
  const [restaurantId, setRestaurantId] = useState(null);
  const [configured, setConfigured]     = useState(false);
  const [records, setRecords]           = useState([]);
  const [synced, setSynced]             = useState(false);
  const [tab, setTab]                   = useState("dashboard");
  const [filterMonth, setFilterMonth]   = useState(new Date().getMonth());
  const filterYear = new Date().getFullYear();
  const [showModal, setShowModal]       = useState(false);
  const [form, setForm]                 = useState({tipo:"ventas",monto:"",desc:"",fecha:new Date().toISOString().slice(0,10),subtipo:""});
  const [showSettings, setShowSettings] = useState(false);
  const unsubRef = useRef(null);

  // Auto-inicializar con config hardcodeada
  useEffect(() => {
    const ok = initFirebase(FIREBASE_CONFIG);
    if (ok) { setRestaurantId("La Industria"); setConfigured(true); }
  }, []);

  // Listener Firestore — lee colecciones originales ventas + gastos
  useEffect(() => {
    if (!configured || !db) return;
    if (unsubRef.current) unsubRef.current();
    loadAllRecords(recs => {
      setRecords(recs);
      setSynced(true);
    }).then(unsub => { unsubRef.current = unsub; });
    return () => { if (unsubRef.current) unsubRef.current(); };
  }, [configured]);

  const handleReady = (rid) => { setRestaurantId(rid); setConfigured(true); };

  const addRecord = async () => {
    if (!form.monto||isNaN(parseFloat(form.monto))) return;
    try {
      await saveRecord({
        tipo: form.tipo,
        subtipo: form.subtipo || "",
        monto: parseFloat(form.monto),
        desc: form.desc,
        fecha: form.fecha,
      });
      setShowModal(false);
      setForm({tipo:"ventas",monto:"",desc:"",fecha:new Date().toISOString().slice(0,10),subtipo:""});
    } catch(e){ alert("Error guardando: "+e.message); }
  };

  const deleteRecord = async (id) => {
    try {
      const rec = records.find(r => r.id === id);
      if (rec) await removeRecord(rec);
    } catch(e){ alert("Error eliminando: "+e.message); }
  };

  const handleDisconnect = () => {
    // Config fija — no se puede desconectar
  };

  if (!configured) return <SetupScreen onReady={handleReady}/>;
  if (!synced && records.length===0) return (
    <div style={{...S.setupWrap}}>
      <div style={{...S.logoCircle,width:60,height:60,margin:"0 auto 16px",borderWidth:3}}>
        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:C.red}}>LI</span>
      </div>
      <div style={{color:C.textSoft,fontSize:13,letterSpacing:2,fontFamily:"'Barlow Condensed',sans-serif"}} className="spin">⏳</div>
      <div style={{color:C.textSoft,fontSize:12,marginTop:8}}>Conectando con la nube...</div>
    </div>
  );

  // KPIs
  const getDate = r => {
    if (!r.fecha) return null;
    if (r.fecha.toDate) return r.fecha.toDate();
    return new Date(r.fecha);
  };
  const monthRecs = records.filter(r=>{
    const d = getDate(r);
    return d && d.getMonth()===filterMonth && d.getFullYear()===filterYear;
  });
  const totalVentas = monthRecs.filter(r=>r.tipo==="ventas").reduce((a,r)=>a+r.monto,0);
  const totalGastos = monthRecs.filter(r=>r.tipo!=="ventas").reduce((a,r)=>a+r.monto,0);
  const utilidad    = totalVentas-totalGastos;
  const pctUtil     = totalVentas>0?(utilidad/totalVentas*100):0;

  const desglose = Object.keys(CATS).filter(k=>k!=="ventas").map(k=>({
    name:CATS[k].label,value:monthRecs.filter(r=>r.tipo===k).reduce((a,r)=>a+r.monto,0),
    color:CATS[k].color,icon:CATS[k].icon,
  })).filter(d=>d.value>0);

  const evolucion = Array.from({length:6},(_,i)=>{
    const m=(filterMonth-5+i+12)%12;
    const recs=records.filter(r=>{const d=getDate(r);return d&&d.getMonth()===m&&d.getFullYear()===filterYear;});
    const v=recs.filter(r=>r.tipo==="ventas").reduce((a,r)=>a+r.monto,0);
    const g=recs.filter(r=>r.tipo!=="ventas").reduce((a,r)=>a+r.monto,0);
    return{mes:MESES[m],ventas:v,gastos:g,utilidad:v-g};
  });

  const navItems=[
    {id:"dashboard",icon:"📊",label:"INICIO"},
    {id:"ventas",   icon:"💰",label:"VENTAS"},
    {id:"gastos",   icon:"💸",label:"GASTOS"},
    {id:"nomina",   icon:"👥",label:"NÓMINA"},
    {id:"historial",icon:"🗂️",label:"HISTORIAL"},
  ];

  return (
    <div style={S.app}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={S.logoCircle}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800,color:C.red}}>LI</span>
        </div>
        <div>
          <div style={S.logoText}>LA INDUSTRIA</div>
          <div style={S.logoSub}>FAST FOOD · GESTIÓN FINANCIERA</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:synced?C.green:C.yellow,fontWeight:600}}>
              {synced?"● EN LÍNEA":"● SINCRONIZANDO"}
            </div>
            <div style={{fontSize:9,color:C.muted}}>{restaurantId}</div>
          </div>
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>⚙️</button>
        </div>
      </div>

      {/* MESES */}
      <div style={S.monthBar}>
        {MESES.map((m,i)=>(
          <button key={m} style={S.monthBtn(i===filterMonth)} onClick={()=>setFilterMonth(i)}>{m}</button>
        ))}
      </div>

      {/* CONTENIDO */}
      <div style={S.content}>
        {tab==="dashboard"&&<Dashboard totalVentas={totalVentas} totalGastos={totalGastos}
          utilidad={utilidad} pctUtil={pctUtil} desglose={desglose} evolucion={evolucion}
          mesNombre={MESES_FULL[filterMonth]}/>}
        {tab==="ventas"&&<ListaRecs records={monthRecs.filter(r=>r.tipo==="ventas")}
          titulo="Ventas del Mes" onDelete={deleteRecord}/>}
        {tab==="gastos"&&<ListaRecs records={monthRecs.filter(r=>["materia_prima","fijo","operativo","impuesto","imprevisto"].includes(r.tipo))}
          titulo="Costos & Gastos" onDelete={deleteRecord}/>}
        {tab==="nomina"&&<ListaRecs records={monthRecs.filter(r=>r.tipo==="nomina")}
          titulo="Nómina" onDelete={deleteRecord}/>}
        {tab==="historial"&&<Historial records={records} onDelete={deleteRecord}/>}
      </div>

      {/* FAB */}
      <button style={S.fab} onClick={()=>setShowModal(true)}>＋</button>

      {/* NAV */}
      <div style={S.navBar}>
        {navItems.map(n=>(
          <button key={n.id} style={S.navItem(tab===n.id)} onClick={()=>setTab(n.id)}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span style={S.navLabel(tab===n.id)}>{n.label}</span>
          </button>
        ))}
      </div>

      {/* MODAL REGISTRO */}
      {showModal&&<ModalRegistro form={form} setForm={setForm} onSave={addRecord} onClose={()=>setShowModal(false)}/>}

      {/* MODAL AJUSTES */}
      {showSettings&&(
        <div style={S.modal} onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
          <div style={S.modalCard}>
            <div style={S.modalHandle}/>
            <div style={{...S.sectionTitle,fontSize:19}}>⚙️ Ajustes</div>
            <div style={{...S.card,marginBottom:12}}>
              <div style={{fontSize:12,color:C.textSoft,marginBottom:4}}>ID DEL RESTAURANTE</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:C.red}}>{restaurantId}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>Usa este ID en otros dispositivos para ver los mismos datos.</div>
            </div>
            <div style={{...S.card,marginBottom:12}}>
              <div style={{fontSize:12,color:C.textSoft,marginBottom:4}}>ESTADO DE CONEXIÓN</div>
              <div style={{fontSize:14,fontWeight:600,color:synced?C.green:C.yellow}}>{synced?"✅ Conectado a la nube":"⚠️ Reconectando..."}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>{records.length} registros totales sincronizados</div>
            </div>
            <button style={S.btn("danger")} onClick={()=>{if(window.confirm("¿Desconectar esta cuenta? Los datos en la nube no se borran."))handleDisconnect();}}>
              🔌 Desconectar y cambiar cuenta
            </button>
            <button style={S.btn("secondary")} onClick={()=>setShowSettings(false)}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── DASHBOARD ──────────────────────────────────────────────── */
function Dashboard({totalVentas,totalGastos,utilidad,pctUtil,desglose,evolucion,mesNombre}){
  const pos=utilidad>=0;
  const uc=pctUtil>20?C.green:pctUtil>0?C.yellow:C.red;
  return(<>
    <div style={S.kpiGrid}>
      <div style={S.kpi(C.green)}><div style={{...S.kpiVal,color:C.green}}>{fmtShort(totalVentas)}</div><div style={S.kpiLabel}>💰 VENTAS {mesNombre.toUpperCase()}</div></div>
      <div style={S.kpi(C.red)}><div style={{...S.kpiVal,color:C.red}}>{fmtShort(totalGastos)}</div><div style={S.kpiLabel}>💸 TOTAL GASTOS</div></div>
      <div style={S.kpi(pos?C.green:C.red)}><div style={{...S.kpiVal,color:pos?C.green:C.red}}>{fmtShort(Math.abs(utilidad))}</div><div style={S.kpiLabel}>{pos?"✅":"❌"} UTILIDAD NETA</div></div>
      <div style={S.kpi(uc)}><div style={{...S.kpiVal,color:uc}}>{pctUtil.toFixed(1)}%</div><div style={S.kpiLabel}>📈 % UTILIDAD REAL</div></div>
    </div>
    <div style={{...S.card,paddingBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:12,color:C.textSoft,fontWeight:600}}>MARGEN DE UTILIDAD</span>
        <span style={{fontSize:12,fontWeight:700,color:uc}}>{pctUtil.toFixed(1)}%</span>
      </div>
      <div style={{background:C.border,height:8,borderRadius:4}}>
        <div style={{height:8,borderRadius:4,width:`${Math.max(0,Math.min(100,pctUtil))}%`,background:uc,transition:"width .6s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:C.textSoft}}>
        <span>0%</span><span style={{color:C.yellow}}>↑ 20% óptimo</span><span>100%</span>
      </div>
    </div>
    {desglose.length>0&&(
      <div style={S.card}>
        <div style={S.sectionTitle}>📊 Desglose de Gastos</div>
        <ResponsiveContainer width="100%" height={170}>
          <PieChart>
            <Pie data={desglose} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={65} paddingAngle={2}>
              {desglose.map((d,i)=><Cell key={i} fill={d.color}/>)}
            </Pie>
            <Tooltip formatter={v=>fmt(v)} contentStyle={{background:C.dark,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}}/>
            <Legend iconSize={9} wrapperStyle={{fontSize:10}}/>
          </PieChart>
        </ResponsiveContainer>
        {desglose.map(d=>(
          <div key={d.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:12,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:9,height:9,borderRadius:2,background:d.color,display:"inline-block"}}/>
              {d.icon} {d.name}
            </span>
            <span style={{fontSize:12,fontWeight:700}}>{fmtShort(d.value)}</span>
          </div>
        ))}
      </div>
    )}
    <div style={S.card}>
      <div style={S.sectionTitle}>📈 Ventas vs Gastos — 6 Meses</div>
      <ResponsiveContainer width="100%" height={190}>
        <BarChart data={evolucion} margin={{top:4,right:4,left:-10,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
          <XAxis dataKey="mes" tick={{fontSize:10,fill:C.textSoft}}/>
          <YAxis tickFormatter={fmtShort} tick={{fontSize:9,fill:C.textSoft}}/>
          <Tooltip formatter={v=>fmt(v)} contentStyle={{background:C.dark,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}}/>
          <Bar dataKey="ventas" name="Ventas" fill={C.green} radius={[3,3,0,0]}/>
          <Bar dataKey="gastos" name="Gastos" fill={C.red} radius={[3,3,0,0]}/>
        </BarChart>
      </ResponsiveContainer>
    </div>
    <div style={S.card}>
      <div style={S.sectionTitle}>💹 Utilidad Neta — 6 Meses</div>
      <ResponsiveContainer width="100%" height={150}>
        <LineChart data={evolucion} margin={{top:4,right:4,left:-10,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
          <XAxis dataKey="mes" tick={{fontSize:10,fill:C.textSoft}}/>
          <YAxis tickFormatter={fmtShort} tick={{fontSize:9,fill:C.textSoft}}/>
          <Tooltip formatter={v=>fmt(v)} contentStyle={{background:C.dark,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11}}/>
          <Line type="monotone" dataKey="utilidad" name="Utilidad" stroke={C.yellow} strokeWidth={2.5} dot={{fill:C.yellow,r:4}}/>
        </LineChart>
      </ResponsiveContainer>
    </div>
    {desglose.length===0&&totalVentas===0&&(
      <div style={{...S.card,textAlign:"center",padding:"36px 16px"}}>
        <div style={{fontSize:40,marginBottom:10}}>🏭</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,marginBottom:6}}>¡Bienvenida, Cindy!</div>
        <div style={{color:C.textSoft,fontSize:13,lineHeight:1.6}}>Presiona el botón <span style={{color:C.red,fontWeight:700}}>＋</span> para registrar tu primera venta o gasto.</div>
      </div>
    )}
  </>);
}

/* ─── LISTA ──────────────────────────────────────────────────── */
function ListaRecs({records,titulo,onDelete}){
  const total=records.reduce((a,r)=>a+r.monto,0);
  return(<>
    <div style={{...S.card,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={S.sectionTitle}>{titulo}</div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800}}>{fmtShort(total)}</div>
        <div style={{fontSize:10,color:C.textSoft}}>{records.length} registros</div>
      </div>
    </div>
    {records.length===0&&(
      <div style={{...S.card,textAlign:"center",padding:"32px 16px"}}>
        <div style={{fontSize:32,marginBottom:8}}>📝</div>
        <div style={{color:C.textSoft,fontSize:13}}>Sin registros este mes</div>
        <div style={{color:C.muted,fontSize:12,marginTop:4}}>Presiona ＋ para agregar</div>
      </div>
    )}
    {records.map(r=>{
      const cat=CATS[r.tipo]||CATS.operativo;
      return(
        <div key={r.id} style={S.listItem}>
          <div style={{fontSize:22}}>{cat.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.desc||cat.label}</div>
            <div style={{display:"flex",gap:6,marginTop:3,alignItems:"center",flexWrap:"wrap"}}>
              <span style={S.badge(cat.color)}>{cat.label}</span>
              <span style={{fontSize:10,color:C.muted}}>{r.fecha}</span>
              {r.subtipo&&<span style={{fontSize:10,color:C.textSoft}}>· {r.subtipo}</span>}
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:r.tipo==="ventas"?C.green:C.text}}>{fmt(r.monto)}</div>
            <button onClick={()=>{if(window.confirm("¿Eliminar este registro?"))onDelete(r.id);}} style={{background:"none",border:"none",color:C.muted,fontSize:14,cursor:"pointer",marginTop:2}}>🗑️</button>
          </div>
        </div>
      );
    })}
  </>);
}

/* ─── HISTORIAL ──────────────────────────────────────────────── */
function Historial({records,onDelete}){
  const [search,setSearch]=useState("");
  const filtered=records.filter(r=>
    r.desc?.toLowerCase().includes(search.toLowerCase())||
    CATS[r.tipo]?.label.toLowerCase().includes(search.toLowerCase())
  ).slice(0,100);
  const totalV=records.filter(r=>r.tipo==="ventas").reduce((a,r)=>a+r.monto,0);
  const totalG=records.filter(r=>r.tipo!=="ventas").reduce((a,r)=>a+r.monto,0);
  return(<>
    <input placeholder="🔍 Buscar registro..." style={S.input} value={search} onChange={e=>setSearch(e.target.value)}/>
    <div style={S.kpiGrid}>
      <div style={S.kpi(C.green)}><div style={{...S.kpiVal,color:C.green,fontSize:18}}>{fmtShort(totalV)}</div><div style={S.kpiLabel}>💰 VENTAS TOTAL</div></div>
      <div style={S.kpi(C.red)}><div style={{...S.kpiVal,color:C.red,fontSize:18}}>{fmtShort(totalG)}</div><div style={S.kpiLabel}>💸 GASTOS TOTAL</div></div>
    </div>
    <div style={{...S.card,display:"flex",justifyContent:"space-between",marginBottom:10}}>
      <span style={{fontSize:12,color:C.textSoft}}>{records.length} registros totales</span>
      <span style={{fontSize:12,color:C.textSoft}}>Mostrando {filtered.length}</span>
    </div>
    {filtered.map(r=>{
      const cat=CATS[r.tipo]||CATS.operativo;
      return(
        <div key={r.id} style={S.listItem}>
          <div style={{fontSize:20}}>{cat.icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.desc||cat.label}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>{r.fecha} · <span style={{color:cat.color}}>{cat.label}</span></div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:r.tipo==="ventas"?C.green:C.text}}>{fmt(r.monto)}</div>
            <button onClick={()=>{if(window.confirm("¿Eliminar?"))onDelete(r.id);}} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>
      );
    })}
  </>);
}

/* ─── MODAL REGISTRO ─────────────────────────────────────────── */
function ModalRegistro({form,setForm,onSave,onClose}){
  const f=(k,v)=>setForm(p=>({...p,[k]:v,...(k==="tipo"?{subtipo:""}:{})}));
  const cat=CATS[form.tipo];
  const subs=SUBTIPOS[form.tipo]||[];
  return(
    <div style={S.modal} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={S.modalCard}>
        <div style={S.modalHandle}/>
        <div style={{...S.sectionTitle,marginBottom:14,fontSize:19}}>{cat?.icon} Nuevo Registro</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.textSoft,marginBottom:7,fontWeight:600,letterSpacing:.5}}>CATEGORÍA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {Object.entries(CATS).map(([k,v])=>(
              <button key={k} onClick={()=>f("tipo",k)} style={{
                padding:"10px 8px",borderRadius:10,cursor:"pointer",
                background:form.tipo===k?v.color+"33":C.card,
                border:`1.5px solid ${form.tipo===k?v.color:C.border}`,
                color:form.tipo===k?v.color:C.textSoft,
                fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",
                display:"flex",alignItems:"center",gap:6,
              }}><span>{v.icon}</span>{v.label}</button>
            ))}
          </div>
        </div>
        {subs.length>0&&(
          <select style={S.select} value={form.subtipo} onChange={e=>f("subtipo",e.target.value)}>
            <option value="">-- Tipo específico --</option>
            {subs.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        )}
        <input style={S.input} type="number" placeholder="Monto en COP (ej: 150000)"
          value={form.monto} onChange={e=>f("monto",e.target.value)} inputMode="decimal"/>
        <input style={S.input} placeholder="Descripción (opcional)"
          value={form.desc} onChange={e=>f("desc",e.target.value)}/>
        <input style={S.input} type="date" value={form.fecha} onChange={e=>f("fecha",e.target.value)}/>
        {form.monto&&(
          <div style={{...S.card,marginBottom:12,borderColor:cat?.color}}>
            <div style={{fontSize:10,color:C.textSoft,marginBottom:4}}>PREVIEW</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={S.badge(cat?.color||C.red)}>{cat?.icon} {cat?.label}</span>
                {form.subtipo&&<span style={{fontSize:11,color:C.textSoft,marginLeft:6}}>· {form.subtipo}</span>}
              </div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,
                color:form.tipo==="ventas"?C.green:C.text}}>{fmt(parseFloat(form.monto)||0)}</div>
            </div>
          </div>
        )}
        <button style={S.btn("primary")} onClick={onSave}>✅ GUARDAR REGISTRO</button>
        <button style={S.btn("secondary")} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
